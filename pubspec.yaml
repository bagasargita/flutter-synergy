name: flutter_synergy
description: "A production-ready Flutter boilerplate with feature-based architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: ^2.3.5

  # Logging
  logger: ^2.6.2
  flutter_dotenv: ^5.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  sensors_plus: ^6.1.1
  flutter_map_tile_caching: ^10.1.1
  image_picker: ^1.0.7
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.0
  path_provider: ^2.1.2
  flutter_image_compress: ^2.4.0
  http_parser: ^4.1.2
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.2.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/env/app_env
